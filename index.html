<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Logic Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .inventory-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .updating {
            transform: scale(1.05);
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .max-highlight {
            background-color: #dcfce7;
            border-color: #22c55e;
        }

        .log-entry {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Manual Inventory Visualizer</h1>
            <p class="text-slate-500">Step through the logic one update at a time to see how the maximum quantity is calculated.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Controls & Inputs -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 text-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Data Setup
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Products Array</label>
                        <input id="input-products" type="text" value="101, 104, 101, 105" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-mono">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Changes Array</label>
                        <input id="input-changes" type="text" value="4, 2, -4, 3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-mono">
                    </div>
                    
                    <div class="pt-4 grid grid-cols-1 gap-2">
                        <button id="btn-init" class="w-full bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg font-medium text-sm flex items-center justify-center gap-2">
                            Reset & Initialize
                        </button>
                        <button id="btn-step" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg font-bold text-base flex items-center justify-center gap-2 shadow-lg shadow-blue-200">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></polygon></svg>
                            Run Next Step
                        </button>
                    </div>
                </div>

                <div class="mt-8">
                    <h2 class="text-sm font-semibold uppercase text-slate-400 tracking-wider mb-2">Step Log</h2>
                    <div id="step-log" class="h-48 overflow-y-auto space-y-2 text-sm text-slate-600 font-mono bg-slate-50 p-3 rounded-lg border border-slate-200">
                    </div>
                </div>
            </div>

            <!-- Main Visualization -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Status Row -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="text-xs font-semibold text-slate-400 uppercase">Step Index</span>
                        <div id="stat-step" class="text-2xl font-bold text-slate-800">0 / 0</div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="text-xs font-semibold text-slate-400 uppercase">Updating ID</span>
                        <div id="stat-active" class="text-2xl font-bold text-blue-600">-</div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="text-xs font-semibold text-slate-400 uppercase">Amount</span>
                        <div id="stat-change" class="text-2xl font-bold text-slate-800">-</div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-green-200 shadow-sm bg-green-50">
                        <span class="text-xs font-semibold text-green-600 uppercase">Max Qty Found</span>
                        <div id="stat-max" class="text-2xl font-bold text-green-700">0</div>
                    </div>
                </div>

                <!-- Inventory Board -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[300px]">
                    <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
                        Current Values (dictionary)
                    </h2>
                    <div id="inventory-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                        <div class="col-span-full text-center text-slate-400 py-12 italic">
                            Initialize the state to begin.
                        </div>
                    </div>
                </div>

                <!-- Result Array Building -->
                <div class="bg-slate-800 p-6 rounded-xl shadow-lg text-white">
                    <h2 class="text-sm font-semibold uppercase text-slate-400 tracking-wider mb-4">Output Array (res)</h2>
                    <div id="result-container" class="flex flex-wrap gap-2 font-mono text-xl">
                        <span class="text-slate-500">[</span>
                        <div id="result-items" class="flex gap-2"></div>
                        <span class="text-slate-500">]</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let changes = [];
        let inventory = {};
        let currentIdx = -1;
        let results = [];

        const elGrid = document.getElementById('inventory-grid');
        const elLog = document.getElementById('step-log');
        const elResults = document.getElementById('result-items');
        
        const statStep = document.getElementById('stat-step');
        const statActive = document.getElementById('stat-active');
        const statChange = document.getElementById('stat-change');
        const statMax = document.getElementById('stat-max');

        function init() {
            products = document.getElementById('input-products').value.split(',').map(x => x.trim()).filter(x => x !== "");
            changes = document.getElementById('input-changes').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            
            if (products.length === 0) {
                alert("Please enter product IDs");
                return false;
            }

            if (products.length !== changes.length) {
                alert(`Arrays mismatch: Products has ${products.length} items, but Changes has ${changes.length}.`);
                return false;
            }

            inventory = {};
            currentIdx = -1;
            results = [];
            
            elGrid.innerHTML = '<div class="col-span-full text-center text-slate-400 py-12 italic">Ready! Click "Next Step" to process update #1.</div>';
            elLog.innerHTML = '<div class="text-blue-500 font-bold">System initialized.</div>';
            elResults.innerHTML = '';
            statMax.innerText = "0";
            
            updateStats();
            return true;
        }

        function updateStats() {
            statStep.innerText = `${currentIdx + 1} / ${products.length}`;
            statActive.innerText = currentIdx >= 0 ? products[currentIdx] : '-';
            statChange.innerText = currentIdx >= 0 ? (changes[currentIdx] > 0 ? '+' + changes[currentIdx] : changes[currentIdx]) : '-';
        }

        function addLog(msg) {
            const div = document.createElement('div');
            div.className = 'log-entry border-l-2 border-slate-200 pl-2';
            div.innerText = `[Step ${currentIdx + 1}] ${msg}`;
            elLog.prepend(div);
        }

        function renderInventory(maxVal, activeProdId) {
            elGrid.innerHTML = '';
            const ids = Object.keys(inventory).sort();
            
            ids.forEach(id => {
                const qty = inventory[id];
                const card = document.createElement('div');
                card.className = `inventory-card border p-4 rounded-lg bg-white relative shadow-sm ${id == activeProdId ? 'updating' : ''} ${qty == maxVal && maxVal > 0 ? 'max-highlight' : ''}`;
                
                card.innerHTML = `
                    <div class="text-[10px] font-bold text-slate-400 mb-1">PRODUCT ${id}</div>
                    <div class="text-2xl font-bold ${qty < 0 ? 'text-red-500' : 'text-slate-800'}">${qty}</div>
                    ${qty == maxVal && maxVal > 0 ? '<div class="absolute top-2 right-2 text-green-600 text-xs font-bold">MAX</div>' : ''}
                `;
                elGrid.appendChild(card);
            });
        }

        function step() {
            if (currentIdx >= products.length - 1) {
                addLog("Processing complete. Press Initialize to start over.");
                return;
            }

            currentIdx++;
            const prodId = products[currentIdx];
            const change = changes[currentIdx];

            // 1. Update dictionary
            const oldQty = inventory[prodId] || 0;
            inventory[prodId] = oldQty + change;
            addLog(`Updated ${prodId}: ${oldQty} -> ${inventory[prodId]}`);

            // 2. Find max (Simulation of your solution's inner loop)
            let maxCurrentQty = 0;
            let checkList = [];
            for (let id in inventory) {
                checkList.push(`${id}:${inventory[id]}`);
                if (inventory[id] > maxCurrentQty) {
                    maxCurrentQty = inventory[id];
                }
            }
            
            results.push(maxCurrentQty);
            statMax.innerText = maxCurrentQty;
            
            // UI Render
            renderInventory(maxCurrentQty, prodId);
            updateStats();
            
            // Build visual output array
            const resItem = document.createElement('span');
            resItem.className = 'bg-blue-600 px-2 py-0.5 rounded text-white font-bold';
            resItem.innerText = maxCurrentQty;
            elResults.appendChild(resItem);

            if (currentIdx === products.length - 1) {
                addLog("Final step reached.");
            }
        }

        document.getElementById('btn-init').addEventListener('click', init);
        document.getElementById('btn-step').addEventListener('click', () => {
            if (currentIdx === -1 && Object.keys(inventory).length === 0 && results.length === 0) {
               if(!init()) return;
            }
            step();
        });

        // Start with initial state
        init();
    </script>
</body>
</html>
